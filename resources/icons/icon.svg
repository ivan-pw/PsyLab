<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Скруглённый фон -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Буква «P» как векторный путь с дыркой (fill-rule="evenodd").
       Никаких шрифтов — рендерится одинаково везде. -->
  <path
    fill="#ffffff"
    fill-rule="evenodd"
    d="
      M 168 128
      L 168 400
      L 230 400
      L 230 296
      L 296 296
      A 84 84 0 0 0 296 128
      Z
      M 230 190
      L 290 190
      A 22 22 0 0 1 290 234
      L 230 234
      Z
    "/>
</svg>
